name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable pnpm
        run: corepack enable
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Unit tests
        run: pnpm test
      - name: Build web
        run: pnpm --filter web build

  db:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGPASSWORD: postgres
      PSQL: psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1
    steps:
      - uses: actions/checkout@v4

      # Stub the Supabase-managed auth surface (auth.users, auth.uid(), roles) so the PHI
      # migrations apply unchanged on vanilla Postgres. TEST-ONLY — never pushed to Supabase.
      - name: Bootstrap auth stub
        run: $PSQL -f supabase/tests/00_bootstrap_auth.sql

      - name: Apply migrations to ephemeral Postgres
        run: |
          for f in supabase/migrations/*.sql; do
            echo "Applying $f"
            $PSQL -f "$f"
          done

      # M0 gate (ADR: every PHI table ships with its RLS isolation test). A cross-family
      # read/write leak RAISEs, which fails this step and blocks the merge.
      - name: RLS isolation test (zero cross-family leak)
        run: $PSQL -f supabase/tests/rls_isolation.test.sql
