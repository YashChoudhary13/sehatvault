<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0F766E" />
    <title>SehatVault</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #fafaf7;
        --surface: #ffffff;
        --primary: #0f766e;
        --primary-ink: #134e4a;
        --ink: #1c1917;
        --muted: #57534e;
        --border: #e7e5e4;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: var(--bg);
        color: var(--ink);
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      main {
        width: min(100%, 360px);
        border: 1px solid var(--border);
        border-radius: 16px;
        background: var(--surface);
        padding: 24px;
        text-align: center;
        box-shadow: 0 20px 40px -28px rgba(19, 78, 74, 0.5);
      }

      img {
        width: 64px;
        height: 64px;
      }

      h1 {
        margin: 16px 0 8px;
        color: var(--primary-ink);
        font-size: 24px;
        line-height: 1.2;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icons/sehatvault-icon.svg" alt="" />
      <h1>SehatVault is offline</h1>
      <p>Reconnect to view private records securely.</p>
    </main>
  </body>
</html>
